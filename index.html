<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#c8960c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Store Manager">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512.png">
<title>Restaurant Store Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e09;--bg2:#1a1810;--card:#1e1c12;--card2:#252218;--border:#332f1e;
  --gold:#c8960c;--gold2:#f0b429;--goldl:#ffd95a;
  --green:#22c55e;--red:#ef4444;--purple:#a855f7;--blue:#3b82f6;--orange:#f97316;
  --text:#f5f0e0;--muted:#7a7055;--muted2:#4a4535;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#12100a,#1e1a0d);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(200,150,12,.15);}
.hbrand{display:flex;align-items:center;gap:10px;}
.hicon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 12px rgba(200,150,12,.3);}
.hname{font-size:1rem;font-weight:800;color:var(--gold2);}
.hsub{font-size:.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.hright{text-align:right;}
.hdate{font-size:.75rem;font-weight:600;color:var(--goldl);}
.htime{font-size:.68rem;color:var(--muted);}

/* INSTALL BAR */
.ibar{display:none;background:linear-gradient(135deg,var(--gold),var(--gold2));padding:9px 14px;align-items:center;justify-content:space-between;gap:10px;}
.ibar.show{display:flex;}
.ibar span{font-size:.78rem;font-weight:600;color:#000;}
.ibtn{background:#000;color:var(--gold2);border:none;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;}
.iclose{background:none;border:none;color:#000;font-size:1.1rem;cursor:pointer;opacity:.7;}

/* OFFLINE */
.obar{display:none;background:#7f1d1d;color:#fca5a5;text-align:center;padding:5px;font-size:.7rem;font-weight:600;}
.obar.show{display:block;}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:64px;padding:10px 6px 8px;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;font-size:.62rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab .ti{font-size:.95rem;}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2);}
#tabLow.has-items{color:var(--orange);}

/* MAIN */
.main{padding:12px 10px 24px;max-width:700px;margin:0 auto;}
.sec{display:none;}
.sec.active{display:block;}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center;}
.snum{font-size:1.3rem;font-weight:800;}
.slbl{font-size:.6rem;color:var(--muted);margin-top:2px;}

/* SEARCH */
.swrap{position:relative;margin-bottom:10px;}
.swrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px 10px 38px;font-family:inherit;font-size:.86rem;color:var(--text);outline:none;}
.swrap input:focus{border-color:var(--gold);}
.swrap input::placeholder{color:var(--muted);}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.95rem;}

/* CAT CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:inherit;font-size:.7rem;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}

/* CAT HEADER */
.cath{font-size:.62rem;font-weight:700;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}

/* ITEM CARD */
.icard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.icard.low{border-color:rgba(249,115,22,.4);}
.icard.zero{border-color:var(--border);opacity:.7;}

/* ITEM TOP */
.itop{padding:9px 12px 6px;display:flex;align-items:flex-start;justify-content:space-between;}
.ileft{flex:1;}
.inum{font-size:.58rem;color:var(--muted);margin-bottom:1px;}
.iname{font-size:.86rem;font-weight:700;line-height:1.2;}
.iroman{font-size:.65rem;color:var(--muted);margin-top:1px;}
.ibadges{display:flex;gap:5px;margin-top:3px;}
.blow{background:#7f1d1d;color:#fca5a5;font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:4px;}
.bzero{background:#292524;color:#78716c;font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:4px;}
.iright{text-align:right;min-width:50px;cursor:pointer;}
.iqty{font-size:1.3rem;font-weight:800;line-height:1;color:var(--gold2);}
.iqty.z{color:var(--red);}
.iunit{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* PURCHASE/USE ROW */
.iact{display:flex;align-items:center;gap:5px;padding:5px 10px 6px;}
.qin{width:58px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 5px;font-family:inherit;font-size:.85rem;color:var(--text);outline:none;text-align:center;}
.qin:focus{border-color:var(--gold);}
.qin::placeholder{color:var(--muted2);font-size:.68rem;}
.bpur{flex:1;background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 4px;font-family:inherit;font-size:.7rem;font-weight:700;cursor:pointer;}
.bpur:active{opacity:.85;}
.buse{flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 4px;font-family:inherit;font-size:.7rem;font-weight:700;cursor:pointer;}
.buse:active{opacity:.85;}

/* MIN LIMIT ROW */
.ilim{display:flex;align-items:center;gap:5px;padding:0 10px 5px;font-size:.65rem;color:var(--muted);}
.lin{width:50px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:4px 5px;font-family:inherit;font-size:.76rem;color:var(--text);outline:none;text-align:center;}
.lin:focus{border-color:var(--gold);}

/* CLOSING ROW — inside item card */
.iclosing{border-top:1px solid var(--border);background:rgba(168,85,247,.06);padding:6px 10px 9px;}
.iclbl{font-size:.58rem;font-weight:700;color:var(--purple);letter-spacing:.5px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.iclbl span{color:var(--muted);font-weight:400;font-size:.57rem;}
.iclbl strong{color:var(--gold2);}
.iclrow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.clin{width:100%;background:var(--bg);border:1px solid rgba(168,85,247,.35);border-radius:8px;padding:9px 10px;font-family:inherit;font-size:.9rem;color:var(--text);outline:none;text-align:center;}
.clin:focus{border-color:var(--purple);}
.clin::placeholder{color:var(--muted2);font-size:.72rem;text-align:center;}
.bclose{width:100%;background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;border:none;border-radius:8px;padding:9px 6px;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;}
.bclose:active{opacity:.85;}

/* HISTORY */
.hitem{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.hname{font-size:.83rem;font-weight:700;}
.hmeta{font-size:.65rem;color:var(--muted);margin-top:2px;}
.htype{font-size:.65rem;font-weight:600;margin-top:3px;}
.hqty{font-size:.95rem;font-weight:800;text-align:right;}
.hqty.p{color:var(--green);}
.hqty.u{color:var(--red);}
.hqty.c{color:var(--purple);}
.hdel{background:none;border:none;color:var(--muted);font-size:.88rem;cursor:pointer;padding:4px;display:block;margin-top:3px;}

/* LOW STOCK TAB */
.lscard{background:var(--card);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.lscard.warn{border-color:rgba(249,115,22,.3);}
.lsname{font-size:.86rem;font-weight:700;}
.lsmeta{font-size:.66rem;color:var(--muted);margin-top:2px;}
.lsqty{font-size:1.05rem;font-weight:800;text-align:right;}
.lsqty.red{color:var(--red);}
.lsqty.ora{color:var(--orange);}
.lsmin{font-size:.62rem;color:var(--muted);margin-top:2px;}
.pbar{background:var(--bg);border-radius:6px;height:5px;overflow:hidden;margin-top:5px;}
.pbar-fill{background:var(--orange);height:100%;border-radius:6px;transition:width .3s;}

/* SUMMARY */
.smcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:10px;}
.smtitle{font-size:.76rem;font-weight:700;color:var(--gold2);margin-bottom:9px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.smrow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.78rem;border-bottom:1px solid rgba(255,255,255,.03);}
.smrow:last-child{border-bottom:none;}
.smval{font-weight:700;}

/* ADD ITEM */
.fcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;}
.ftitle{font-size:.83rem;font-weight:700;color:var(--gold2);margin-bottom:13px;}
.ig{margin-bottom:10px;}
.il{font-size:.7rem;color:var(--muted);margin-bottom:4px;display:block;font-weight:500;}
.ifield{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:.88rem;color:var(--text);outline:none;}
.ifield:focus{border-color:var(--gold);}
select.ifield{cursor:pointer;}
select.ifield option{background:#1e1c12;}
.ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px;}
.ubtn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 4px;font-family:inherit;font-size:.72rem;color:var(--muted);cursor:pointer;text-align:center;}
.ubtn.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}

/* EXPORT */
.excard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:12px;}
.extitle{font-size:.83rem;font-weight:700;color:var(--gold2);margin-bottom:4px;}
.exdesc{font-size:.72rem;color:var(--muted);margin-bottom:11px;line-height:1.5;}

/* BUTTONS */
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;margin-top:5px;}
.btn:active{transform:scale(.98);}
.bgold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.bgreen{background:var(--green);color:#fff;}
.bred2{background:var(--red);color:#fff;}
.bblue{background:var(--blue);color:#fff;}
.bmut{background:var(--card2);color:var(--muted);border:1px solid var(--border);margin-top:8px;}
.bsm{padding:8px 13px;font-size:.76rem;border-radius:9px;border:none;font-family:inherit;font-weight:700;cursor:pointer;}

/* OVERLAY */
.ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);backdrop-filter:blur(4px);justify-content:center;align-items:flex-end;}
.ov.open{display:flex;}
.sheet{background:var(--card2);border-radius:20px 20px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:600px;padding:18px 14px 28px;max-height:90vh;overflow-y:auto;animation:sup .27s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.shtitle{font-size:.98rem;font-weight:800;margin-bottom:11px;color:var(--gold2);}
.pwin{width:100%;text-align:center;font-size:1.5rem;letter-spacing:10px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:11px;font-family:inherit;color:var(--text);outline:none;}
.pwin:focus{border-color:var(--gold);}

/* AI */
.ail{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.78rem;padding:12px 0;}
.aidot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pu 1s infinite;}
.aidot:nth-child(2){animation-delay:.2s}.aidot:nth-child(3){animation-delay:.4s}
@keyframes pu{0%,100%{opacity:.3}50%{opacity:1}}
.aibox{background:var(--bg);border-radius:10px;padding:11px;font-size:.78rem;line-height:1.7;color:#ccc;margin-top:7px;}

/* CHAT */

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:8px 18px;font-size:.8rem;z-index:500;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

/* SECTION HEADER */
.sechdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.sechdr h2{font-size:.9rem;font-weight:800;}
</style>
</head>
<body>

<div class="obar" id="obar">📵 Offline — Stock chal raha hai, AI nahi chalega</div>
<div class="ibar" id="ibar">
  <span>📲 App install karein!</span>
  <button class="ibtn" onclick="installApp()">Install</button>
  <button class="iclose" onclick="document.getElementById('ibar').classList.remove('show')">✕</button>
</div>

<div class="hdr">
  <div class="hbrand">
    <div class="hicon">🍽️</div>
    <div><div class="hname">Soulful Bites</div><div class="hsub">Store Manager</div></div>
  </div>
  <div class="hright">
    <div class="hdate" id="hDate"></div>
    <div class="htime" id="hTime"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('stock',this)"><span class="ti">📦</span>Stock</button>
  <button class="tab" id="tabLow" onclick="showTab('lowstock',this)"><span class="ti">⚠️</span>Kam Stock</button>
  <button class="tab" onclick="showTab('history',this)"><span class="ti">📋</span>History</button>
  <button class="tab" onclick="showTab('summary',this)"><span class="ti">📊</span>Summary</button>
  <button class="tab" onclick="showTab('items',this)"><span class="ti">➕</span>Items</button>

</div>

<div class="main">

<!-- STOCK -->
<div class="sec active" id="sec-stock">
  <div class="srow">
    <div class="scard"><div class="snum" style="color:var(--gold2)" id="stTotal">0</div><div class="slbl">Total Items</div></div>
    <div class="scard"><div class="snum" style="color:var(--green)" id="stPur">0</div><div class="slbl">Aaj Purchase</div></div>
    <div class="scard"><div class="snum" style="color:var(--red)" id="stUse">0</div><div class="slbl">Aaj Use</div></div>
  </div>
  <div class="swrap"><span class="sico">🔍</span><input type="text" id="srch" placeholder="Search items..." oninput="renderStock()"></div>
  <div class="chips" id="chips"></div>
  <div id="stockList"></div>
</div>

<!-- KAM STOCK -->
<div class="sec" id="sec-lowstock">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:13px;">
    <div style="font-size:.83rem;font-weight:700;color:var(--orange);margin-bottom:3px;">⚠️ Kam aur Khatam Items</div>
    <div style="font-size:.72rem;color:var(--muted);line-height:1.5;">Sirf woh items jo min limit se kam hain ya bilkul khatam hain</div>
  </div>
  <div id="lowList"></div>
</div>

<!-- HISTORY -->
<div class="sec" id="sec-history">
  <div class="sechdr">
    <h2>📋 History</h2>
    <div style="display:flex;gap:7px;">
      <select id="hfilt" onchange="renderHistory()" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-family:inherit;font-size:.72rem;color:var(--text);outline:none;">
        <option value="all">Sab</option>
        <option value="purchase">Purchase</option>
        <option value="use">Use</option>
        <option value="closing">Closing</option>
      </select>
      <button onclick="askDelAll()" class="bsm bred2">🗑️ Delete</button>
    </div>
  </div>
  <div id="histList"></div>
</div>

<!-- SUMMARY -->
<div class="sec" id="sec-summary">
  <div class="sechdr">
    <h2>📊 Summary</h2>
    <div style="display:flex;gap:6px;">
      <button onclick="copyReport()" class="bsm" style="background:var(--gold);color:#000;">📋 Copy</button>
      <button onclick="exportExcel()" class="bsm" style="background:#1d6f42;color:#fff;">📊 Excel</button>
      <button onclick="exportPDF()" class="bsm" style="background:#c0392b;color:#fff;">📄 PDF</button>
    </div>
  </div>
  <!-- Filter buttons -->
  <div style="display:flex;gap:7px;margin-bottom:12px;">
    <button id="sfAll" onclick="setSumFilter('all')" style="flex:1;padding:9px 6px;border-radius:10px;border:none;font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;background:var(--gold);color:#000;">📊 Sab</button>
    <button id="sfPur" onclick="setSumFilter('purchase')" style="flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--border);font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;background:var(--card);color:var(--green);">➕ Aaj Purchase</button>
    <button id="sfUse" onclick="setSumFilter('use')" style="flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--border);font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;background:var(--card);color:var(--red);">➖ Aaj Use</button>
  </div>
  <!-- Export type selector -->
  <div id="exportTypeSel" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;">
    <div style="font-size:.78rem;font-weight:700;color:var(--gold2);margin-bottom:9px;">📤 Export Type Chunein:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">
      <button onclick="doExport('today','excel')" style="background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 7px;font-family:inherit;font-size:.72rem;color:var(--text);cursor:pointer;font-weight:600;">📅 Aaj ka Hisab<br><span style='color:var(--muted);font-weight:400;font-size:.65rem;'>Purchase, Use, Closing</span></button>
      <button onclick="doExport('stock','excel')" style="background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 7px;font-family:inherit;font-size:.72rem;color:var(--text);cursor:pointer;font-weight:600;">📦 Poora Stock<br><span style='color:var(--muted);font-weight:400;font-size:.65rem;'>Abhi ka bacha hua</span></button>
    </div>
    <button onclick="document.getElementById('exportTypeSel').style.display='none'" style="margin-top:8px;width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:7px;font-family:inherit;font-size:.72rem;color:var(--muted);cursor:pointer;">✕ Cancel</button>
  </div>
  <div id="sumContent"></div>
</div>

<!-- ITEMS -->
<div class="sec" id="sec-items">
  <div class="fcard">
    <div class="ftitle">➕ Naya Item Add Karo</div>
    <div class="ig"><label class="il">Item Naam *</label><input type="text" class="ifield" id="niName" placeholder="Jaise: Atta, Chicken, Tel..."></div>
    <div class="ig"><label class="il">Roman Urdu Naam</label><input type="text" class="ifield" id="niRoman" placeholder="Jaise: Fine Ata, Cooking Oil..."></div
